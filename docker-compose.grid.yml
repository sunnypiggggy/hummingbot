services:
  hummingbot-grid:
    container_name: hummingbot-grid
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.grid
    environment:
      SCRIPT_CONFIG: walk_forward_portfolio_grid.yml
      HEADLESS_MODE: "true"
    volumes:
      - ./conf:/home/hummingbot/conf
      - ./logs:/home/hummingbot/logs
      - ./data:/home/hummingbot/data
      - ./certs:/home/hummingbot/certs
      - ./scripts:/home/hummingbot/scripts
      - ./controllers:/home/hummingbot/controllers
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    tty: true
    stdin_open: true
    network_mode: host
    restart: unless-stopped
    command: >
      bash -lc "conda activate hummingbot &&
      ./bin/hummingbot_quickstart.py
      --config-password \"$${CONFIG_PASSWORD}\"
      --v2 \"$${SCRIPT_CONFIG}\"
      --headless true
      2>> ./logs/errors.log"
